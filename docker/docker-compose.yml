networks:
  litellm_net:
  n8n_net:
  # postiz_net:
  # open_web_ui_net:

services:

  n8n-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${N8N_DB_USER}
      - POSTGRES_PASSWORD=${N8N_DB_PASS}
      - POSTGRES_DB=${N8N_DB_NAME}
    volumes:
      - n8n_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER} -d ${N8N_DB_NAME}"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks: 
      n8n_net:

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME}
      - DB_POSTGRESDB_USER=${N8N_DB_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASS}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=n8n.alexandru-croitoriu.dev
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.alexandru-croitoriu.dev/
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_SECURE_COOKIE=false
      - N8N_LISTEN_ADDRESS=0.0.0.0
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks: 
      n8n_net:
    # extra_hosts:
      # - host.docker.internal:host-gateway

  litellm-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LITELLM_DB_USER}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASS}
      POSTGRES_DB: ${LITELLM_DB_NAME}
    volumes:
      - litellm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LITELLM_DB_USER} -d ${LITELLM_DB_NAME}"]
      start_period: 30s     # ← give the init time
      interval: 10s
      timeout: 5s
      retries: 5
    networks: 
      litellm_net:

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    command: ["--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - DATABASE_URL=postgresql://${LITELLM_DB_USER}:${LITELLM_DB_PASS}@litellm-postgres:5432/${LITELLM_DB_NAME}
      - STORE_MODEL_IN_DB=true
      - LITELLM_LOG=info
      - PGSSLMODE=disable
    depends_on:
      litellm-postgres:
        condition: service_healthy
    networks: 
      litellm_net:

